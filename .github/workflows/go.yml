# This workflow will build a golang project and create release artifacts
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0)
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        run: go test -v ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')  # Only run on version tags
    permissions:
      contents: write  # Required to create releases
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build for Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -o configforge-linux-amd64 ./cmd

      - name: Build for Linux (arm64)
        run: GOOS=linux GOARCH=arm64 go build -o configforge-linux-arm64 ./cmd

      - name: Build for macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o configforge-darwin-amd64 ./cmd

      - name: Build for macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o configforge-darwin-arm64 ./cmd

      - name: Build for Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -o configforge-windows-amd64.exe ./cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            configforge-linux-amd64
            configforge-linux-arm64
            configforge-darwin-amd64
            configforge-darwin-arm64
            configforge-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
